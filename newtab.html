<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chrome - Med</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background wallpaper -->
  <div id="wallpaper" class="wallpaper"></div>
  <div class="wallpaper-overlay"></div>

  <!-- Blur overlay (hide mode) — sits above everything except clock -->
  <div id="blurOverlay" class="blur-overlay"></div>

  <!-- Clock & Date + Quick Search -->
  <div class="clock-widget" id="clockWidget">
    <div class="clock-time-row">
      <span class="clock-time" id="clockTime">00:00</span>
      <span class="clock-seconds" id="clockSeconds">00</span>
    </div>
    <div class="clock-date" id="clockDate">Monday, January 1</div>

    <!-- Quick launch bar -->
    <div class="ql-wrap">
      <div class="ql-bar">
        <svg class="ql-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="qlInput" class="ql-input" placeholder="Search web or bookmarks…" autocomplete="off" spellcheck="false" />
        <div class="ql-engine-toggle" id="qlEngineToggle" title="Switch search engine">
          <span id="qlEngineLabel">G</span>
        </div>
      </div>
      <div class="ql-results" id="qlResults"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="app">
    <nav class="tab-bar" id="tabBar">
      <button class="tab-add-btn" id="addTabBtn" title="Add category">+</button>
    </nav>
    <div class="divider"></div>
    <main class="bookmark-list" id="bookmarkList"></main>
  </div>

  <!-- Right action buttons -->
  <div class="action-bar">
    <button class="action-btn" id="hideBtn" title="Hide bookmarks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </button>
    <button class="action-btn" id="gridBtn" title="Grid view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="action-btn" id="searchBtn" title="Search (Ctrl+K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <!-- Hidden but functional -->
    <button class="action-btn" id="importBtn" title="Settings / Wallpaper" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="action-btn" id="incognitoBtn" title="Incognito" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="3" y1="3" x2="21" y2="21"/></svg>
    </button>
    <button class="action-btn" id="deleteBtn" title="Delete mode" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
  </div>

  <!-- Bottom left: wallpaper -->
  <button class="wallpaper-btn" id="wallpaperBtn" title="Change wallpaper">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </button>

  <!-- Bottom right: settings -->
  <button class="settings-btn" id="settingsBtn" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>

  <!-- Search overlay -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search bookmarks..." autocomplete="off" />
      <button id="searchClose">✕</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- Modal: Add/Edit Bookmark -->
  <div class="modal-overlay" id="bookmarkModal">
    <div class="modal">
      <h2 id="modalTitle">Add Bookmark</h2>
      <input type="text" id="bm-name" placeholder="Name" />
      <input type="url" id="bm-url" placeholder="URL (https://...)" />
      <div class="modal-row">
        <label>Category:</label>
        <select id="bm-category"></select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="bmModalCancel">Cancel</button>
        <button class="btn-save" id="bmModalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add Tab -->
  <div class="modal-overlay" id="tabModal">
    <div class="modal">
      <h2>Add Category</h2>
      <input type="text" id="tab-name" placeholder="Category name" />
      <div class="color-picker-row">
        <label>Accent color:</label>
        <div class="color-swatches" id="colorSwatches"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="tabModalCancel">Cancel</button>
        <button class="btn-save" id="tabModalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Modal: Settings -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal settings-modal">
      <h2>Settings</h2>

      <section>
        <h3>Wallpaper <span id="wallpaperTabLabel" style="font-weight:400;text-transform:none;font-size:12px;opacity:0.6;"></span></h3>
        <p class="hint">Wallpaper is saved per tab. Changing it here only affects the current tab.</p>
        <div class="setting-row">
          <label>Upload image:</label>
          <input type="file" id="wallpaperFile" accept="image/*" />
        </div>
        <div class="setting-row">
          <label>Fit mode:</label>
          <div class="fit-btns" id="fitBtns">
            <button class="fit-btn" data-fit="100% 100%">Stretch</button>
            <button class="fit-btn" data-fit="cover">Cover</button>
            <button class="fit-btn" data-fit="contain">Contain</button>
          </div>
        </div>
        <a class="btn-sm wallpaper-gallery-btn" href="https://lumilist.in/wallpapers/" target="_blank" rel="noopener">
          🖼 More wallpapers → lumilist.in/wallpapers
        </a>
        <button class="btn-danger-sm" id="wallpaperClear">Remove wallpaper</button>
      </section>

      <section>
        <h3>Bookmarks</h3>
        <button class="btn-sm" id="addBookmarkBtn">+ Add bookmark</button>
        <button class="btn-sm" id="exportBtn">Export JSON</button>
        <div class="setting-row">
          <label>Import JSON:</label>
          <input type="file" id="importFile" accept=".json" />
        </div>
      </section>

      <section>
        <h3>Danger Zone</h3>
        <button class="btn-danger-sm" id="clearAllBtn">Clear all data</button>
      </section>

      <div class="modal-actions">
        <button class="btn-save" id="settingsClose">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
